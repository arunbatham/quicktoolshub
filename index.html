<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free AI Tools - Quick Tools Hub</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui, Arial;
        background: #0f172a;
        color: white;
        text-align: center;
         padding-bottom: 160px;
      }

      /* Container */
      .container {
        padding: 20px;
      }

      /* Heading */
      h1 {
        font-size: 24px;
        margin-bottom: 5px;
      }

      p {
        font-size: 14px;
        color: #ccc;
      }

      /* Buttons */
      .btn {
        display: block;
        width: 100%;
        max-width: 400px;
        margin: 12px auto;
        padding: 16px;
        font-size: 16px;
        border-radius: 12px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        background: #22c55e;
        color: black;
      }

      .btn:active {
        transform: scale(0.98);
      }

      /* Sticky CTA */
      .sticky {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #020617;
        padding: 10px 0px;
      }

      .sticky button {
        width: 90%;
        max-width: 400px;
        padding: 15px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #facc15;
        font-weight: bold;
      }

      /* Loader */
      #loader {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        background: #000000dd;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ccc;
        border-top: 4px solid #22c55e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      /* Desktop tweak */
      @media (min-width: 768px) {
        h1 {
          font-size: 32px;
        }
        .btn {
          font-size: 18px;
        }
      }
      a {
        text-decoration: none;
      }
    </style>
