<!doctype html>
<html>

  <body>
    <header class="navbar">
      <h2 class="logo">⚡ Quick tools hub</h2>
    </header>
    <h1>🎬 YouTube Thumbnail Downloader</h1>

    <div class="ad">
      <script>
        atOptions = {
          key: "311c33db7d274e86dd694ba1af23c11e",
          format: "iframe",
          height: 90,
          width: 728,
          params: {},
        };
      </script>
      <script src="https://www.highperformanceformat.com/311c33db7d274e86dd694ba1af23c11e/invoke.js"></script>
    </div>

    <input type="text" id="url" placeholder="Paste YouTube URL" />
    <button onclick="getThumbnail()">Get Thumbnail</button>

    <br /><br />
    <img id="thumb" width="300" />

    <div class="ad">
      <script>
        atOptions = {
          key: "d3e0a6d23feca1ae6e5d6cf2e697ecb7",
          format: "iframe",
          height: 50,
          width: 320,
          params: {},
        };
      </script>
      <script src="https://www.highperformanceformat.com/d3e0a6d23feca1ae6e5d6cf2e697ecb7/invoke.js"></script>
    </div>

    <script>
      function getThumbnail() {
        let url = document.getElementById("url").value;

        let videoId = url.split("v=")[1];
        if (videoId) {
          let ampersandPosition = videoId.indexOf("&");
          if (ampersandPosition != -1) {
            videoId = videoId.substring(0, ampersandPosition);
          }
        }

        let thumbnail =
          "https://img.youtube.com/vi/" + videoId + "/hqdefault.jpg";

        document.getElementById("thumb").src = thumbnail;
      }
    </script>
  </body>
