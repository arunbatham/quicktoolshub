<!DOCTYPE html>
<html>
<head>
<title>Thumbnail Downloader</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>🎬 YouTube Thumbnail Downloader</h1>

<div class="ad">Ad Space</div>

<input type="text" id="url" placeholder="Paste YouTube URL">
<button onclick="getThumbnail()">Get Thumbnail</button>

<br><br>
<img id="thumb" width="300">

<div class="ad">Ad Space</div>

<script>
function getThumbnail() {
  let url = document.getElementById("url").value;

  let videoId = url.split("v=")[1];
  if(videoId){
    let ampersandPosition = videoId.indexOf("&");
    if(ampersandPosition != -1){
      videoId = videoId.substring(0, ampersandPosition);
    }
  }

  let thumbnail = "https://img.youtube.com/vi/" + videoId + "/hqdefault.jpg";

  document.getElementById("thumb").src = thumbnail;
}
</script>

</body>
</html>
