    <div class="ad">
      <script>
        atOptions = {
          key: "311c33db7d274e86dd694ba1af23c11e",

      </script>
      <script src="https://www.highperformanceformat.com/311c33db7d274e86dd694ba1af23c11e/invoke.js"></script>
    </div>

    <input type="number" id="length" placeholder="Password Length (e.g. 8)" />
    <button onclick="generatePassword()">Generate</button>

    <h3 id="result"></h3>

    <div class="ad">
      <script>
        atOptions = {
          key: "d3e0a6d23feca1ae6e5d6cf2e697ecb7",
          format: "iframe",
          height: 50,
          width: 320,
          params: {},

      </script>
      <script src="https://www.highperformanceformat.com/d3e0a6d23feca1ae6e5d6cf2e697ecb7/invoke.js"></script>
    </div>

    <script>
      function generatePassword() {
        let length = document.getElementById("length").value;
        let chars =
          "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$!";
        let pass = "";

        for (let i = 0; i < length; i++) {
          pass += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        document.getElementById("result").innerText = pass;
      }
    </script>
  </body>
